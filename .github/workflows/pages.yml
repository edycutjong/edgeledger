name: Deploy Docs to GitHub Pages

# Publishes the static docs/ folder (landing page + animated hero/icon + the
# /pitch deck) to GitHub Pages, served at the CNAME domain https://edgeledger.edycu.dev/ .
# Deploys during the RELEASE phase: publishing a GitHub Release ships the site.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  release:
    types: [published]
  workflow_dispatch:   # manual re-deploy without cutting a release

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
