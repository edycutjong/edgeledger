<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- EdgeLedger animated README hero v2.
       GitHub-safe: CSS @keyframes in an inline style block only - no scripting, no external fonts/images/CSS.
       Fully standalone: literal brand hex from _tokens.css copied inline
       (#FF007A pink=REJECTED, #FFB300 gold=APPROVED, #0A0A12 base).
       Motion system: seamless 12s master loop.
         scene A (bad bet -> REJECTED slam)  ~ 0%..47%
         scene B (disciplined -> APPROVED)   ~ 50%..97%
       Plus ambient layers: drifting grid, breathing glows, floating particles,
       wordmark light-sweep, stroke draw-ins, typewriter request line.
       Scene A + drawn strokes are the authored base state, so the
       prefers-reduced-motion / no-CSS fallback renders a complete scene. -->
  <title>EdgeLedger — the agent that rejects your bet</title>
  <defs>
    <radialGradient id="hGlowP" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF007A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF007A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hGlowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hRows" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="hSeal" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF007A"/>
      <stop offset="100%" stop-color="#FF6FB1"/>
    </linearGradient>
    <linearGradient id="hTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B9C0D4"/>
    </linearGradient>
    <linearGradient id="hUnder" gradientUnits="userSpaceOnUse" x1="168" y1="136" x2="493" y2="136">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF007A"/>
    </linearGradient>
    <linearGradient id="hSweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#FFE9B8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="hGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <clipPath id="hClip"><rect width="1200" height="360" rx="12"/></clipPath>
    <clipPath id="hWordClip">
      <text x="170" y="122" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5">EdgeLedger</text>
    </clipPath>
    <mask id="hTypeM">
      <rect class="type" x="58" y="296" width="770" height="30" fill="#FFFFFF"/>
    </mask>
  </defs>

  <style>
    .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    .slip, .stamp, .shake, .shock, .ink, .glow, .breathe, .sweepR, .type {
      transform-box: fill-box; transform-origin: 50% 50%;
    }
    .type { transform-origin: 0% 50%; }
    /* Scene A (REJECTED) is the no-animation / reduced-motion static state. */
    .slipB, .stampB { opacity: 0; }
    .shock { opacity: 0; }
    .sweepR { opacity: 0; }

    /* ambient atmosphere */
    .gridDrift { animation: gridDrift 12s linear infinite; }
    .glowP  { animation: glowP 12s ease-in-out infinite; }
    .glowA  { animation: glowA 12s ease-in-out infinite; }
    .breathe { animation: breathe 6s ease-in-out infinite; }
    .pt1 { animation: drift 12s linear infinite; }
    .pt2 { animation: drift 6s  linear infinite; animation-delay: -2.4s; }
    .pt3 { animation: drift 4s  linear infinite; animation-delay: -1.2s; }
    .fl1 { animation: floaty 6s ease-in-out infinite; }
    .fl2 { animation: floaty 6s ease-in-out infinite; animation-delay: -2s; }
    .fl3 { animation: floaty 6s ease-in-out infinite; animation-delay: -4s; }

    /* signature verdict choreography */
    .slipA  { animation: slipA 12s cubic-bezier(0.22,1,0.36,1) infinite; }
    .slipB  { animation: slipB 12s cubic-bezier(0.22,1,0.36,1) infinite; }
    .stampA { animation: stampA 12s cubic-bezier(0.34,1.56,0.64,1) infinite; }
    .stampB { animation: stampB 12s cubic-bezier(0.34,1.56,0.64,1) infinite; }
    .shakeA { animation: shakeA 12s ease-out infinite; }
    .shakeB { animation: shakeB 12s ease-out infinite; }
    .shockA { animation: shockA 12s cubic-bezier(0.16,1,0.3,1) infinite; }
    .shockB { animation: shockB 12s cubic-bezier(0.16,1,0.3,1) infinite; }
    .shockA2 { animation: shockA 12s cubic-bezier(0.16,1,0.3,1) infinite; animation-delay: 0.14s; }
    .shockB2 { animation: shockB 12s cubic-bezier(0.16,1,0.3,1) infinite; animation-delay: 0.14s; }
    .inkA { animation: inkA 12s ease-out infinite; }
    .inkB { animation: inkB 12s ease-out infinite; }

    /* polish */
    .sweepR { animation: sweep 12s ease-in-out infinite; }
    .draw1  { stroke-dasharray: 325 325; animation: draw1 12s ease-in-out infinite; }
    .draw2  { stroke-dasharray: 370 370; animation: draw2 12s ease-in-out infinite; }
    .type   { animation: type 12s steps(46, end) infinite; }
    .pulse  { animation: pulse 3s ease-in-out infinite; }
    .cursor { animation: blink 1s steps(1) infinite; }

    @keyframes gridDrift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(-48px, -48px); }
    }
    @keyframes glowP {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(42px, 24px) scale(1.09); }
    }
    @keyframes glowA {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-38px, -20px) scale(1.07); }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 0.85; transform: scale(1.12); }
    }
    @keyframes drift {
      0%   { transform: translateY(16px); opacity: 0; }
      25%  { opacity: 0.6; }
      75%  { opacity: 0.35; }
      100% { transform: translateY(-36px); opacity: 0; }
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }

    @keyframes slipA {
      0%        { opacity: 0; transform: translateY(26px) scale(0.98); }
      5%        { opacity: 1; transform: translateY(-5px) scale(1.005); }
      7.5%      { transform: translateY(0) scale(1); }
      42%       { opacity: 1; transform: translateY(0) scale(1); }
      47%, 100% { opacity: 0; transform: translateY(14px) scale(0.99); }
    }
    @keyframes slipB {
      0%, 50%   { opacity: 0; transform: translateY(26px) scale(0.98); }
      55%       { opacity: 1; transform: translateY(-5px) scale(1.005); }
      57.5%     { transform: translateY(0) scale(1); }
      92%       { opacity: 1; transform: translateY(0) scale(1); }
      97%, 100% { opacity: 0; transform: translateY(14px) scale(0.99); }
    }
    @keyframes stampA {
      0%, 9%    { opacity: 0; transform: scale(2.6) rotate(4deg); }
      12%       { opacity: 1; transform: scale(0.9) rotate(0deg); }
      13.6%     { transform: scale(1.07); }
      15.2%     { transform: scale(0.985); }
      16.4%     { transform: scale(1); }
      42%       { opacity: 1; transform: scale(1); }
      47%, 100% { opacity: 0; transform: scale(1); }
    }
    @keyframes stampB {
      0%, 59%   { opacity: 0; transform: scale(2.6) rotate(4deg); }
      62%       { opacity: 1; transform: scale(0.9) rotate(0deg); }
      63.6%     { transform: scale(1.07); }
      65.2%     { transform: scale(0.985); }
      66.4%     { transform: scale(1); }
      92%       { opacity: 1; transform: scale(1); }
      97%, 100% { opacity: 0; transform: scale(1); }
    }
    @keyframes shakeA {
      0%, 10.8%   { transform: none; }
      12%         { transform: translate(-3px, 2px) rotate(-0.5deg); }
      13.2%       { transform: translate(2px, -1.5px) rotate(0.35deg); }
      14.4%       { transform: translate(-1px, 1px); }
      15.6%, 100% { transform: none; }
    }
    @keyframes shakeB {
      0%, 60.8%   { transform: none; }
      62%         { transform: translate(-3px, 2px) rotate(-0.5deg); }
      63.2%       { transform: translate(2px, -1.5px) rotate(0.35deg); }
      64.4%       { transform: translate(-1px, 1px); }
      65.6%, 100% { transform: none; }
    }
    @keyframes shockA {
      0%, 11.4% { opacity: 0; transform: scale(0.6); }
      12.4%     { opacity: 0.85; transform: scale(0.95); }
      22%       { opacity: 0; transform: scale(1.9); }
      100%      { opacity: 0; transform: scale(1.9); }
    }
    @keyframes shockB {
      0%, 61.4% { opacity: 0; transform: scale(0.6); }
      62.4%     { opacity: 0.85; transform: scale(0.95); }
      72%       { opacity: 0; transform: scale(1.9); }
      100%      { opacity: 0; transform: scale(1.9); }
    }
    @keyframes inkA {
      0%, 12%  { opacity: 0; }
      13%      { opacity: 1; }
      18%      { opacity: 0.55; }
      100%     { opacity: 0.55; }
    }
    @keyframes inkB {
      0%, 62%  { opacity: 0; }
      63%      { opacity: 1; }
      68%      { opacity: 0.55; }
      100%     { opacity: 0.55; }
    }

    @keyframes sweep {
      0%, 20%   { opacity: 0; transform: translateX(-130px) skewX(-18deg); }
      22%       { opacity: 1; }
      32%       { opacity: 1; transform: translateX(410px) skewX(-18deg); }
      34%, 68%  { opacity: 0; transform: translateX(-130px) skewX(-18deg); }
      70%       { opacity: 1; }
      80%       { opacity: 1; transform: translateX(410px) skewX(-18deg); }
      82%, 100% { opacity: 0; transform: translateX(410px) skewX(-18deg); }
    }
    @keyframes draw1 {
      0%   { stroke-dashoffset: 325; opacity: 1; }
      9%   { stroke-dashoffset: 0; }
      95%  { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
    @keyframes draw2 {
      0%, 4% { stroke-dashoffset: 370; opacity: 1; }
      14%    { stroke-dashoffset: 0; }
      95%    { stroke-dashoffset: 0; opacity: 1; }
      100%   { stroke-dashoffset: 0; opacity: 0; }
    }
    @keyframes type {
      0%, 3% { transform: scaleX(0); }
      26%    { transform: scaleX(1); }
      100%   { transform: scaleX(1); }
    }
    @keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .gridDrift, .glowP, .glowA, .breathe, .pt1, .pt2, .pt3,
      .fl1, .fl2, .fl3,
      .slipA, .slipB, .stampA, .stampB, .shakeA, .shakeB,
      .shockA, .shockB, .shockA2, .shockB2, .inkA, .inkB,
      .sweepR, .draw1, .draw2, .type, .pulse, .cursor { animation: none; }
      .pulse { opacity: 1; }
    }
  </style>

  <g clip-path="url(#hClip)">
    <!-- backdrop: base + drifting grid + breathing corner glows -->
    <rect width="1200" height="360" fill="#0A0A12"/>
    <g class="gridDrift">
      <rect width="1296" height="456" fill="url(#hGrid)"/>
    </g>
    <ellipse class="glow glowP" cx="170" cy="40" rx="520" ry="300" fill="url(#hGlowP)"/>
    <ellipse class="glow glowA" cx="1060" cy="330" rx="520" ry="300" fill="url(#hGlowA)"/>

    <!-- ambient particles (kept in the empty gutter + top edge, away from text) -->
    <circle class="pt1" cx="706" cy="84"  r="2"   fill="#FFB300" opacity="0.3"/>
    <circle class="pt2" cx="742" cy="292" r="2.4" fill="#FF007A" opacity="0.3"/>
    <circle class="pt3" cx="676" cy="180" r="1.6" fill="#FFFFFF" opacity="0.25"/>
    <circle class="pt2" cx="1168" cy="70" r="1.8" fill="#FFB300" opacity="0.3"/>
    <circle class="pt1" cx="748" cy="150" r="1.5" fill="#FFFFFF" opacity="0.2"/>
    <circle class="pt3" cx="1150" cy="316" r="2"  fill="#FF007A" opacity="0.25"/>

    <!-- ===== left: mark + wordmark ===== -->
    <ellipse class="breathe" cx="108" cy="102" rx="78" ry="72" fill="url(#hGlowP)" opacity="0.6"/>
    <g transform="translate(64,58) scale(0.17)" fill="none">
      <rect x="16" y="16" width="480" height="480" rx="112" fill="#12101C"/>
      <rect x="22" y="22" width="468" height="468" rx="106" stroke="rgba(255,255,255,0.14)" stroke-width="6"/>
      <rect x="116" y="164" width="280" height="38" rx="19" fill="url(#hRows)"/>
      <rect x="116" y="237" width="280" height="38" rx="19" fill="url(#hRows)" opacity="0.72"/>
      <rect x="116" y="310" width="280" height="38" rx="19" fill="url(#hRows)" opacity="0.46"/>
      <circle cx="328" cy="183" r="26" fill="#FFB300"/>
      <circle cx="328" cy="183" r="26" stroke="#0A0A12" stroke-width="9"/>
      <circle cx="256" cy="256" r="146" stroke="url(#hSeal)" stroke-width="42"/>
      <path d="M158 158 L354 354" stroke="url(#hSeal)" stroke-width="42" stroke-linecap="round"/>
    </g>

    <text x="170" y="122" font-size="58" font-weight="700" letter-spacing="-1.5" fill="url(#hTitle)">EdgeLedger</text>
    <!-- light sweep clipped to the wordmark glyphs -->
    <g clip-path="url(#hWordClip)">
      <rect class="sweepR" x="150" y="62" width="112" height="76" fill="url(#hSweep)"/>
    </g>
    <!-- gold-to-pink underline draws itself in each loop -->
    <line class="draw1" x1="168" y1="136" x2="493" y2="136" stroke="url(#hUnder)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

    <text x="66" y="184" font-size="23" fill="#A9B0C4">The agent that <tspan fill="#FF007A" font-weight="600">rejects</tspan> your bet &#8212;</text>
    <text x="66" y="216" font-size="23" fill="#A9B0C4">pay <tspan fill="#FFB300" font-weight="600">5&#162;</tspan>, get a <tspan fill="#FFB300" font-weight="600">verdict</tspan>, not a prediction.</text>

    <!-- chips (gentle staggered float idle) -->
    <g class="mono" font-size="14">
      <g class="fl1">
        <rect x="66" y="244" width="152" height="32" rx="16" fill="none" stroke="rgba(255,179,0,0.45)"/>
        <text x="142" y="265" text-anchor="middle" fill="#FFB300">x402 &#183; 5&#162;/call</text>
      </g>
      <g class="fl2">
        <rect x="230" y="244" width="202" height="32" rx="16" fill="none" stroke="rgba(255,255,255,0.15)"/>
        <text x="331" y="265" text-anchor="middle" fill="#8B93A7">X Layer &#183; eip155:196</text>
      </g>
      <g class="fl3">
        <rect x="444" y="244" width="252" height="32" rx="16" fill="none" stroke="rgba(255,0,122,0.4)"/>
        <text x="570" y="265" text-anchor="middle" fill="#8B93A7">APPROVED / <tspan fill="#FF007A">REJECTED</tspan> / SKIP</text>
      </g>
    </g>

    <!-- request line: typewriter reveal + blinking cursor -->
    <g mask="url(#hTypeM)">
      <text x="66" y="316" class="mono" font-size="14" fill="#4A5065">POST /api/edge &#8594; 402 Payment Required &#8594; X-PAYMENT &#8594; verdict + settled receipt<tspan class="cursor" fill="#8B93A7">_</tspan></text>
    </g>

    <!-- ===== right: bet slip + verdict stamp ===== -->
    <!-- scene A : bad bet, REJECTED (also the static reduced-motion frame) -->
    <g class="slip slipA">
      <g class="shake shakeA">
        <rect x="784" y="70" width="352" height="200" rx="16" fill="#12121D" stroke="rgba(255,255,255,0.12)"/>
        <rect x="784" y="70" width="352" height="40" rx="16" fill="rgba(255,255,255,0.04)"/>
        <text x="808" y="96" class="mono" font-size="13" fill="#8B93A7" letter-spacing="2">BET SLIP &#8470; 0231</text>
        <text x="1112" y="96" text-anchor="end" class="mono" font-size="13" fill="#4A5065">WC&#183;R16</text>
        <text x="808" y="142" font-size="23" font-weight="600" fill="#F2F3F7">Brazil ML @ 1.45</text>
        <text x="808" y="172" class="mono" font-size="14" fill="#8B93A7">proposed stake&#160;&#160;8% bankroll</text>
        <text x="808" y="196" class="mono" font-size="14" fill="#8B93A7">fair 62% vs implied 69% &#183; edge grade <tspan fill="#FF007A" font-weight="700">D</tspan></text>
        <text x="808" y="246" class="mono" font-size="13" fill="#4A5065">verdict: no edge &#183; sized like a tilt bet</text>
      </g>
    </g>
    <!-- impact shockwaves, REJECTED -->
    <g transform="rotate(-8 960 198)">
      <rect class="shock shockA" x="828" y="164" width="264" height="68" rx="10" fill="none" stroke="#FF007A" stroke-width="3"/>
      <rect class="shock shockA2" x="828" y="164" width="264" height="68" rx="10" fill="none" stroke="#FF007A" stroke-width="1.5"/>
    </g>
    <g class="stamp stampA">
      <g transform="rotate(-8 960 198)">
        <rect x="828" y="164" width="264" height="68" rx="10" fill="rgba(10,10,18,0.55)" stroke="#FF007A" stroke-width="5"/>
        <rect class="ink inkA" x="836" y="172" width="248" height="52" rx="6" fill="none" stroke="#FF007A" stroke-width="1.5" opacity="0.55"/>
        <text x="963" y="210" text-anchor="middle" font-size="34" font-weight="800" letter-spacing="6" fill="#FF007A">REJECTED</text>
      </g>
    </g>

    <!-- scene B : disciplined bet, APPROVED -->
    <g class="slip slipB">
      <g class="shake shakeB">
        <rect x="784" y="70" width="352" height="200" rx="16" fill="#12121D" stroke="rgba(255,255,255,0.12)"/>
        <rect x="784" y="70" width="352" height="40" rx="16" fill="rgba(255,255,255,0.04)"/>
        <text x="808" y="96" class="mono" font-size="13" fill="#8B93A7" letter-spacing="2">BET SLIP &#8470; 0232</text>
        <text x="1112" y="96" text-anchor="end" class="mono" font-size="13" fill="#4A5065">WC&#183;R16</text>
        <text x="808" y="142" font-size="23" font-weight="600" fill="#F2F3F7">Japan +0.5 @ 2.05</text>
        <text x="808" y="172" class="mono" font-size="14" fill="#8B93A7">ladder stake&#160;&#160;1.5u (rung 4/5)</text>
        <text x="808" y="196" class="mono" font-size="14" fill="#8B93A7">fair 54% vs implied 49% &#183; edge grade <tspan fill="#FFB300" font-weight="700">A&#8722;</tspan></text>
        <text x="808" y="246" class="mono" font-size="13" fill="#4A5065">mirror receipt: seller same side, +2.1u</text>
      </g>
    </g>
    <!-- impact shockwaves, APPROVED -->
    <g transform="rotate(-8 960 198)">
      <rect class="shock shockB" x="828" y="164" width="264" height="68" rx="10" fill="none" stroke="#FFB300" stroke-width="3"/>
      <rect class="shock shockB2" x="828" y="164" width="264" height="68" rx="10" fill="none" stroke="#FFB300" stroke-width="1.5"/>
    </g>
    <g class="stamp stampB">
      <g transform="rotate(-8 960 198)">
        <rect x="828" y="164" width="264" height="68" rx="10" fill="rgba(10,10,18,0.55)" stroke="#FFB300" stroke-width="5"/>
        <rect class="ink inkB" x="836" y="172" width="248" height="52" rx="6" fill="none" stroke="#FFB300" stroke-width="1.5" opacity="0.55"/>
        <text x="963" y="210" text-anchor="middle" font-size="34" font-weight="800" letter-spacing="6" fill="#FFB300">APPROVED</text>
      </g>
    </g>

    <!-- settled-ledger strip under the slip (separator draws in) -->
    <line class="draw2" x1="784" y1="288" x2="1136" y2="288" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <g class="mono" font-size="12">
      <text x="784" y="308" fill="#4A5065">settled ledger &#183; losses included</text>
      <circle class="pulse" cx="1024" cy="304" r="4" fill="#FFB300"/>
      <text x="1036" y="308" fill="#8B93A7">+2.1u</text>
      <circle cx="1090" cy="304" r="4" fill="#FF007A"/>
      <text x="1102" y="308" fill="#8B93A7">&#8722;1.0u</text>
    </g>

    <!-- frame -->
    <rect x="0.5" y="0.5" width="1199" height="359" rx="12" fill="none" stroke="rgba(255,255,255,0.08)"/>
  </g>
</svg>
